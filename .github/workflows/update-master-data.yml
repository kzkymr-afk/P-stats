name: マスターデータ週次更新

on:
  schedule:
    # 毎週月曜 0:00 UTC = 日本時間 9:00
    - cron: '0 0 * * 1'
  workflow_dispatch:  # 手動実行用（Actions タブから「Run workflow」）

env:
  # Node.js 20 非推奨に備え、JavaScript アクションを Node.js 24 で実行する（2026年6月以降のデフォルトに先行対応）
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # スクリプトの書き込み先を明示（リポジトリルートの machines.json に確実に書く）
  MACHINES_JSON_PATH: ${{ github.workspace }}/machines.json

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # リポジトリに push するために必要

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v5

      - name: 作業ディレクトリの確認
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "machines.json の有無:"
          ls -la "$GITHUB_WORKSPACE/machines.json" 2>/dev/null || echo "（存在しない）"

      - name: Python をセットアップ
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 依存をインストール
        run: pip install requests google-auth

      - name: マスターデータを更新
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "${GOOGLE_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "::warning::GOOGLE_SERVICE_ACCOUNT_JSON が空です。シートが制限付きのときは取得に失敗します。"
          else
            echo "GOOGLE_SERVICE_ACCOUNT_JSON: 設定済み（${#GOOGLE_SERVICE_ACCOUNT_JSON} 文字）"
          fi
          python scripts/update_machines.py
          echo "--- 書き込み後のファイル ---"
          ls -la "$MACHINES_JSON_PATH"
          echo "取得件数: $(python -c "import json; d=json.load(open('$MACHINES_JSON_PATH')); print(len(d))")"

      - name: 変更をコミット＆プッシュ
        run: |
          git add "$MACHINES_JSON_PATH"
          if git diff --staged --quiet; then
            echo "machines.json に変更がありません（取得件数: $(python -c "import json; d=json.load(open('$MACHINES_JSON_PATH')); print(len(d))")）。スプレッドシートが未更新のためコミットはスキップします。"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: マスターデータを自動更新"
          git push || (echo "::error::git push に失敗しました。ブランチ保護や権限を確認してください。" && exit 1)

      # main の machines.json と Pages を揃える（master_out 配信は別ワークフロー。ここでは machines.json のみ差し替え）
      - name: GitHub Pages の machines.json を同期
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if ! git ls-remote --heads origin gh-pages 2>/dev/null | grep -q refs/heads/gh-pages; then
            echo "::notice::gh-pages が未作成のためスキップ。先に「master_out を GitHub Pages に配信」を1回実行すると、以降は週次更新で machines.json が Pages にも反映されます。"
            exit 0
          fi
          TMP=$(mktemp -d)
          git clone --depth 1 --branch gh-pages "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" "$TMP/pages"
          cp "$MACHINES_JSON_PATH" "$TMP/pages/machines.json"
          cd "$TMP/pages"
          if git diff --quiet machines.json 2>/dev/null; then
            echo "Pages 上の machines.json に変更なし"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add machines.json
          git commit -m "chore: sync machines.json from main (${{ github.sha }})"
          git push
